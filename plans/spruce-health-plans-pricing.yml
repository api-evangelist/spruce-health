specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Spruce Health
providerId: spruce-health
created: '2026-07-10'
modified: '2026-07-10'
reconciled: true
tags:
- Healthcare
- HIPAA
- Communication
- Secure Messaging
- Plans
description: >-
  Spruce Health is priced per user per month, where a user is any teammate
  (clinician, staff, employee) added to the organization - patients are not
  billed users. There are two published plans: Basic at $24/user/month and
  Communicator at $49/user/month. Integrations and API access are part of the
  Communicator plan; the Public API itself carries no separate metered fee, but
  API access must additionally be enabled by Spruce Support before tokens can be
  generated. A 14-day free trial (no credit card) is offered and billing is
  month-to-month.
notes: >-
  Per-user monthly prices are grounded from the Spruce Health plans page
  (sprucehealth.com/plans) as of the created date. Annual pricing is not
  published on that page. API access is gated behind both the Communicator plan
  and a support-enabled flag on the organization.
sources:
- https://sprucehealth.com/plans
- https://developer.sprucehealth.com/docs/overview
- https://help.sprucehealth.com/hc/en-us/articles/23003250146459-Spruce-API
plans:
- id: spruce-basic
  name: Basic
  type: subscription
  description: >-
    HIPAA-compliant plan with secure messaging, video telemedicine, e-fax,
    secure team chat, and clinical questionnaires. Does not include API access.
  entries:
  - label: Basic Per User
    name: basic_per_user
    type: recurring
    metric: seats
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: $24 per user per month
    userMultiplied: true
  elements:
  - name: HIPAA-Compliant Messaging
  - name: Video Telemedicine
  - name: eFax
  - name: Secure Team Chat
  - name: Clinical Questionnaires
- id: spruce-communicator
  name: Communicator
  type: subscription
  description: >-
    Everything in Basic plus auto-attendant phone trees, VoIP desk phones,
    scheduled call routing, bulk messaging, mobile payments, integrations, and
    API access. This is the plan that includes the Spruce Public API.
  entries:
  - label: Communicator Per User
    name: communicator_per_user
    type: recurring
    metric: seats
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: $49 per user per month
    userMultiplied: true
  elements:
  - name: Everything in Basic
  - name: Auto-Attendant Phone Trees
  - name: VoIP Desk Phones
  - name: Scheduled Call Routing
  - name: Bulk Messaging
  - name: Mobile Payments
  - name: Integrations and API Access
- id: spruce-free-trial
  name: Free Trial
  type: trial
  description: >-
    14-day free trial with no credit card required; month-to-month billing,
    cancel any time.
  entries:
  - label: Trial Period
    name: trial_period
    type: flat
    metric: days
    limit: 14
    timeFrame: once
    geo: global
    unit: 1
    price: free for 14 days
    userMultiplied: false
  elements:
  - name: Evaluate Basic or Communicator
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
