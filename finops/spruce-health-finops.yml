description: >-
  FinOps view of Spruce Health spend. Spruce bills a flat per-user
  subscription - Basic at $24/user/month and Communicator at $49/user/month -
  rather than usage-metered API calls. The Public API does not carry a separate
  per-request charge; it is a feature of the Communicator plan (and must be
  enabled by Spruce Support). The dominant cost driver is therefore the number
  of billed users (teammates) on the plan, not API traffic. Some communication
  activity (for example telephony or fax volume) may incur usage charges outside
  the base subscription; verify against a current invoice.
notes: >-
  Per-user prices are grounded from sprucehealth.com/plans. Any overage or
  usage-based telephony/fax charges are not itemized here and should be
  reconciled from an actual Spruce invoice during a FinOps review.
