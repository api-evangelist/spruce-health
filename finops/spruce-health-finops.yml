meters:
- name: user_seats
  description: Billed teammates (clinicians, staff, employees) on the plan, charged per user per month.
  unit: seats
  aggregation: sum
  dimensions:
  - organization
  - plan
- name: telephony_usage
  description: Optional voice / fax usage that may be billed beyond the base subscription.
  unit: minutes
  aggregation: sum
  dimensions:
  - organization
  - phone_line
principles:
- name: Visibility
  description: Track the number of active billed users per plan; the seat count, not API traffic, drives the invoice.
- name: Allocation
  description: Map user seats to locations, teams, or cost centers within the organization.
- name: Optimization
  description: Right-size the plan tier (Basic vs Communicator) to who actually needs API/integration and telephony features; deactivate unused teammates.
- name: Accountability
  description: Assign an owner for the Spruce subscription; review seat count and any telephony overages monthly.
